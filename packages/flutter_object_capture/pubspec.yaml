name: flutter_object_capture
description: Flutter plugin for Apple's RealityKit Object Capture (PhotogrammetrySession) — guided photo capture and on-device photogrammetry that turns a set of images into a textured USDZ model on iOS.
version: 0.0.2
homepage: https://github.com/Barba2k2/flutter_roomplan/tree/master/packages/flutter_object_capture
repository: https://github.com/Barba2k2/flutter_roomplan
issue_tracker: https://github.com/Barba2k2/flutter_roomplan/issues

topics:
  - object-capture
  - photogrammetry
  - realitykit
  - usdz
  - ios

platforms:
  ios:

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      ios:
        pluginClass: SwiftFlutterObjectCapturePlugin
